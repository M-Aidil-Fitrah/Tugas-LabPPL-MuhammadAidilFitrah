{% extends 'catalog/base.html' %}

{% block content %}
    <div class="max-w-2xl mx-auto">
        {% if produk %}
            <div class="border rounded-lg p-8 shadow-sm bg-gray-50 text-center">
                <h1 class="text-3xl font-bold text-gray-800 mb-4">{{ produk.nama }}</h1>
                <p class="text-2xl text-blue-600 font-extrabold mb-6">Rp{{ produk.harga }}</p>
                <div class="bg-white p-4 rounded text-left border mb-6 text-gray-700">
                    <h3 class="font-semibold mb-2 border-b pb-1">Deskripsi Produk:</h3>
                    <p>{{ produk.deskripsi }}</p>
                </div>
            </div>
        {% else %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
                <strong class="font-bold">Error!</strong>
                <span class="block sm:inline">Produk tidak ditemukan.</span>
            </div>
        {% endif %}
        <div class="mt-6 text-center">
            <a href="/produk/" class="text-blue-600 hover:text-blue-800 font-semibold">&larr; Kembali ke Daftar Produk</a>
        </div>
    </div>
{% endblock %}
