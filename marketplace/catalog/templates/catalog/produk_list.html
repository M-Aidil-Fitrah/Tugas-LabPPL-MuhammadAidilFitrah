{% extends 'catalog/base.html' %}

{% block content %}
    <h1 class="text-3xl font-bold mb-6 border-b pb-2">Daftar Produk</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for produk in produk_list %}
            <div class="border rounded-lg p-5 shadow hover:shadow-md transition bg-gray-50">
                <h2 class="text-xl font-semibold text-gray-800 mb-2">{{ produk.nama }}</h2>
                <p class="text-blue-600 font-bold mb-4">Rp{{ produk.harga }}</p>
                <a href="/produk/{{ produk.id }}/" class="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded hover:bg-blue-200 transition inline-block">
                    Lihat Detail &rarr;
                </a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
