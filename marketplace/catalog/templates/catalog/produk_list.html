{% extends 'catalog/base.html' %}

{% block content %}
    <h1>Daftar Produk</h1>
    <ul>
        {% for produk in produk_list %}
            <li>
                <a href="/produk/{{ produk.id }}/"><strong>{{ produk.nama }}</strong></a>
                - Rp{{ produk.harga }}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
