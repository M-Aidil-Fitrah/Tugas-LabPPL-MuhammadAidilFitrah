{% extends 'catalog/base.html' %}

{% block content %}
<div class="container mx-auto px-6 py-12">
    <div class="flex justify-between items-center mb-8 border-b-2 border-gray-200 pb-4">
        <h1 class="text-3xl font-extrabold text-gray-800">Katalog Produk</h1>
        <span class="bg-blue-100 text-blue-800 text-sm font-semibold px-4 py-1 rounded-full">{{ produk_list|length }} Produk Ditemukan</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        {% for produk in produk_list %}
            <div class="bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-2xl transition duration-300 flex flex-col group border border-gray-100">
                <!-- Image Wrapper -->
                <div class="relative h-48 w-full overflow-hidden bg-gray-200">
                    <img src="{{ produk.gambar }}" alt="{{ produk.nama }}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute top-3 right-3 bg-white/90 backdrop-blur text-xs font-bold text-gray-800 px-3 py-1 rounded-full shadow">
                        <i class="fas fa-cubes text-blue-500"></i> Sisa: {{ produk.stok }}
                    </div>
                </div>
                
                <!-- Card Content -->
                <div class="p-6 flex-grow flex flex-col">
                    <h2 class="text-lg font-bold text-gray-800 mb-2 leading-tight flex-grow line-clamp-2">{{ produk.nama }}</h2>
                    <p class="text-2xl text-blue-700 font-extrabold mb-4">Rp {{ produk.harga }}</p>
                    
                    <a href="/produk/{{ produk.id }}/" class="block text-center w-full bg-blue-600 text-white font-semibold px-4 py-3 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition">
                        Detail Produk
                    </a>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
